<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vache Qui Rit - Pro Gallery</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- LightGallery CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.1/css/lightgallery-bundle.min.css">
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; padding: 15px; }
        .grid .item { height: 120px; border-radius: 8px; overflow: hidden; background: #1a1a1a; position: relative; cursor: pointer; }
        .grid img, .grid video { width: 100%; height: 100%; object-fit: cover; }
        .video-icon { position: absolute; top: 5px; right: 5px; background: rgba(255,68,68,0.8); color: white; border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: bold; }
        .add-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: #ff4444; color: white; border-radius: 50%; font-size: 40px; border: none; cursor: pointer; z-index: 1000; box-shadow: 0 5px 15px rgba(255,68,68,0.4); }
        #status { position: fixed; top: 0; width: 100%; background: #ff4444; padding: 10px; z-index: 10001; display: none; font-weight: bold; }
        .login-screen { padding-top: 150px; }
        .login-screen h1 { color: #ff4444; margin-bottom: 30px; }
    </style>
</head>
<body>
    <!-- اسم ملف الأغنية بالمسافات زي ما هو في GitHub -->
    <audio id="bgMusic" src="La%20Vache%20Qui%20Rit%20.mp3" loop></audio>

    <div id="login" class="login-screen">
        <h1>🐮 La Vache Qui Rit</h1>
        <button class="add-btn" style="position: static; transform: none;" onclick="start()">Enter ❤️</button>
    </div>

    <div id="gallery" style="display:none;">
        <div id="status">Uploading Media... 🚀</div>
        <div class="grid" id="grid"></div>
        <button class="add-btn" onclick="document.getElementById('f').click()">+</button>
        <input type="file" id="f" hidden multiple accept="image/*,video/*" onchange="uploadFiles(this.files)">
    </div>

    <!-- LightGallery JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.1/lightgallery.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTkz07GYiwjebwpmPk_KDffGcFPlofze4",
            authDomain: "la-vache-qui-rit-e6016.firebaseapp.com",
            projectId: "la-vache-qui-rit-e6016",
            storageBucket: "la-vache-qui-rit-e6016.appspot.com",
            messagingSenderId: "173876009603",
            appId: "1:173876009603:web:7705b9a8cb0f0d0c5759b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // بيانات Cloudinary الخاصة بك
        const CLOUD_NAME = "dobvxzwuf"; 
        const UPLOAD_PRESET = "La vache qui rit"; 

        function start() {
            document.getElementById('bgMusic').play().catch(e => console.log("Audio play blocked"));
            document.getElementById('login').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
        }

        async function uploadFiles(files) {
            const status = document.getElementById('status');
            status.style.display = 'block';
            for (let file of files) {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", UPLOAD_PRESET);
                
                // تحديد نوع الملف (صورة أو فيديو) لضمان الرفع الصحيح
                const resourceType = file.type.startsWith('video') ? 'video' : 'image';

                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`, {
                        method: "POST",
                        body: formData
                    });
                    const data = await res.json();
                    if (data.secure_url) {
                        // حفظ الرابط والنوع في Firebase
                        await db.collection('media').add({
                            url: data.secure_url,
                            type: resourceType,
                            time: Date.now()
                        });
                    }
                } catch (e) { console.error("Error during upload:", e); }
            }
            status.style.display = 'none';
        }

        // عرض الصور والفيديوهات من Firebase
        db.collection('media').orderBy('time', 'desc').onSnapshot(snap => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = 'item';
                if (item.type === 'video') {
                    // إضافة علامة فيديو ولقطة شاشة مصغرة
                    div.innerHTML = `<span class="video-icon">VIDEO</span><video src="${item.url}#t=0.1"></video>`;
                } else {
                    div.innerHTML = `<img src="${item.url}">`;
                }
                // الضغط يفتح الملف في نافذة جديدة (أو يمكنك دمج LightGallery هنا لاحقاً)
                div.onclick = () => window.open(item.url, '_blank');
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
