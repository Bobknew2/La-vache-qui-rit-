<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vache Qui Rit Gallery</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #333; overflow-x: hidden; }
        #login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .profile-img { width: 200px; height: 200px; border-radius: 50%; border: 6px solid #ff4444; object-fit: cover; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-enter { background: #ff4444; color: white; border: none; padding: 15px 40px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        #gallery-page { display: none; padding: 20px; min-height: 100vh; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding-bottom: 100px; }
        .gallery-item { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .emoji { position: fixed; font-size: 30px; animation: flyUp 7s linear infinite; z-index: 99; pointer-events: none; }
        @keyframes flyUp { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; } }

        .add-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 65px; height: 65px; background: #ff4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; cursor: pointer; z-index: 1000; box-shadow: 0 8px 25px rgba(255, 68, 68, 0.4); }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 2000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .nav-btn { position: absolute; top: 50%; color: #ff4444; font-size: 40px; cursor: pointer; padding: 20px; user-select: none; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-page">
        <img src="Screenshot_20260504_175235.jpg" class="profile-img">
        <h1>Are you from "la vache qui rit" group?</h1>
        <button class="btn-enter" onclick="enterApp()">Yes, I am ❤️</button>
    </div>

    <div id="gallery-page">
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="add-btn" onclick="document.getElementById('fileInput').click()">+</div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadImage(this.files[0])">
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <span class="nav-btn" style="left: 10px;" onclick="changeImage(-1)">&#10094;</span>
        <img id="lightboxImg" src="">
        <span class="nav-btn" style="right: 10px;" onclick="changeImage(1)">&#10095;</span>
    </div>

    <audio id="bgMusic" loop><source src="La Vache Qui Rit .mp3" type="audio/mpeg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDTkz07GYiwjebwpmPk_KDffGcFPlofze4",
            authDomain: "la-vache-qui-rit-e6016.firebaseapp.com",
            projectId: "la-vache-qui-rit-e6016",
            storageBucket: "la-vache-qui-rit-e6016.firebasestorage.app",
            messagingSenderId: "173876009603",
            appId: "1:173876009603:web:7705b9a8cb0f0d0c5759b6",
            measurementId: "G-JGM0WBPDWV"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let allImages = [];
        let currentIndex = 0;

        function enterApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('gallery-page').style.display = 'block';
            document.getElementById('bgMusic').play().catch(() => {});
            startFloatingEmojis();
            listenForImages();
        }

        async function uploadImage(file) {
            if (!file) return;
            try {
                // محاولة الرفع على Storage
                const ref = storage.ref('gallery/' + Date.now() + "_" + file.name);
                const snapshot = await ref.put(file);
                const url = await snapshot.ref.getDownloadURL();
                // حفظ الرابط في Firestore للأبد
                await db.collection('photos').add({ url: url, createdAt: Date.now() });
                alert("Image added to memories! ❤️");
            } catch (e) {
                console.error(e);
                alert("Make sure you enabled 'Test Mode' in Firebase Firestore and Storage!");
            }
        }

        function listenForImages() {
            db.collection('photos').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const grid = document.getElementById('galleryGrid');
                grid.innerHTML = '';
                allImages = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    allImages.push(data.url);
                    const img = document.createElement('img');
                    img.src = data.url;
                    img.className = 'gallery-item';
                    const idx = allImages.length - 1;
                    img.onclick = () => openLightbox(idx);
                    grid.appendChild(img);
                });
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightboxImg').src = allImages[currentIndex];
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        function changeImage(step) {
            currentIndex += step;
            if (currentIndex >= allImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = allImages.length - 1;
            document.getElementById('lightboxImg').src = allImages[currentIndex];
        }

        function startFloatingEmojis() {
            const emojis = ['❤️', '😂', '🐮'];
            setInterval(() => {
                const el = document.createElement('div');
                el.className = 'emoji';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 95 + 'vw';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 7000);
            }, 600);
        }
    </script>
</body>
</html>
