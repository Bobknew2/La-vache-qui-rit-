<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vache Qui Rit - Memories</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; overflow-x: hidden; }
        .login-page { padding: 50px 20px; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #ff4444; object-fit: cover; }
        .btn-enter { background: #ff4444; color: white; padding: 15px 35px; border-radius: 30px; border: none; cursor: pointer; font-size: 18px; margin-top: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(255,68,68,0.3); }
        #gallery { display: none; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }
        .grid img { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; transition: 0.3s; }
        .add-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: #ff4444; color: white; border-radius: 50%; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 25px rgba(255,68,68,0.5); z-index: 1000; }
        .emoji { position: fixed; font-size: 50px; bottom: -60px; animation: fly 5s linear infinite; z-index: 10000; pointer-events: none; }
        @keyframes fly { to { transform: translateY(-120vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login" class="login-page">
        <img src="Screenshot_20260504_175235.jpg" class="profile-img">
        <h1>Are you from "la vache qui rit" group?</h1>
        <button class="btn-enter" onclick="startApp()">Yes, I am ❤️</button>
    </div>

    <div id="gallery">
        <div class="grid" id="photoGrid"></div>
        <div class="add-btn" onclick="document.getElementById('fileInput').click()">+</div>
        <input type="file" id="fileInput" hidden multiple accept="image/*" onchange="handleUpload(this.files)">
    </div>

    <script>
        // بيانات Firebase الخاصة بيك (Firestore بس اللي هنستخدمه)
        const firebaseConfig = {
            apiKey: "AIzaSyDTkz07GYiwjebwpmPk_KDffGcFPlofze4",
            authDomain: "la-vache-qui-rit-e6016.firebaseapp.com",
            projectId: "la-vache-qui-rit-e6016",
            storageBucket: "la-vache-qui-rit-e6016.appspot.com",
            messagingSenderId: "173876009603",
            appId: "1:173876009603:web:7705b9a8cb0f0d0c5759b6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function startApp() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            // تشغيل الإيموجيز
            setInterval(() => {
                const e = document.createElement('div');
                e.className = 'emoji';
                e.innerText = ['❤️', '😂', '🐮', '🔥', '✨'][Math.floor(Math.random()*5)];
                e.style.left = Math.random() * 90 + 'vw';
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 5000);
            }, 500);
        }

        async function handleUpload(files) {
            const IMGBB_KEY = "714cc473e63e3ba752719943bfd4ee36"; // الـ API Key بتاعك

            for (let file of files) {
                let formData = new FormData();
                formData.append("image", file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        // حفظ الرابط في Firestore
                        await db.collection('memories').add({
                            url: result.data.url,
                            time: Date.now()
                        });
                    }
                } catch (err) {
                    console.error("Upload failed", err);
                }
            }
        }

        // عرض الصور فوراً من Firestore
        db.collection('memories').orderBy('time', 'desc').onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                html += `<img src="${doc.data().url}">`;
            });
            document.getElementById('photoGrid').innerHTML = html;
        });
    </script>
</body>
</html>
