<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Vache Qui Rit Gallery</title>
    <style>
        /* ستايل عام للموقع */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            overflow-x: hidden;
        }

        /* صفحة الدخول */
        #login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 5px solid #ff0000;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .btn-enter {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-enter:hover {
            transform: scale(1.05);
            background-color: #cc0000;
        }

        /* صفحة الجاليري */
        #gallery-page {
            display: none;
            padding: 20px;
            min-height: 100vh;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            padding-bottom: 100px;
        }

        .gallery-item {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #333;
        }

        /* زرار الـ + المبدع */
        .add-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 65px;
            height: 65px;
            background-color: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.6);
            z-index: 100;
            transition: 0.2s;
        }

        .add-btn:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* الإيموجيز */
        .emoji {
            position: fixed;
            font-size: 28px;
            animation: fly 6s linear infinite;
            z-index: 99;
            pointer-events: none;
            user-select: none;
        }

        @keyframes fly {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="login-page">
        <img src="Screenshot_20260504_175235.jpg" alt="Group Photo" class="profile-img">
        <h2 style="margin-bottom: 30px;">إنت من جروب la vache qui rit؟ 🐮</h2>
        <button class="btn-enter" onclick="enterGallery()">أيوة، أنا من la vache qui rit ❤️</button>
    </div>

    <div id="gallery-page">
        <h3 style="text-align: center; color: #ff0000;">ذكريات الشلة 🐮✨</h3>
        <div class="gallery-grid" id="galleryGrid">
            </div>

        <div class="add-btn" onclick="document.getElementById('fileInput').click()">+</div>
        <input type="file" id="fileInput" hidden multiple accept="image/*,video/*" onchange="handleFiles(this.files)">
    </div>

    <audio id="bgMusic" loop>
        <source src="La Vache Qui Rit .mp3" type="audio/mpeg">
    </audio>

    <script>
        function enterGallery() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('gallery-page').style.display = 'block';
            
            // تشغيل الموسيقى
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("المتصفح منع التشغيل التلقائي، جرب تلمس الشاشة"));
            
            startEmojis();
        }

        function handleFiles(files) {
            const grid = document.getElementById('galleryGrid');
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let element;
                    if (file.type.startsWith('image/')) {
                        element = document.createElement('img');
                    } else {
                        element = document.createElement('video');
                        element.muted = true;
                        element.loop = true;
                    }
                    element.src = e.target.result;
                    element.className = 'gallery-item';
                    
                    // لما تدوس على الصورة تفتح كبيرة
                    element.onclick = () => window.open(e.target.result, '_blank');
                    
                    grid.appendChild(element);
                }
                reader.readAsDataURL(file);
            }
        }

        function startEmojis() {
            const emojis = ['❤️', '😂', '🐮'];
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'emoji';
                div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                div.style.left = Math.random() * 90 + 'vw';
                // سرعة عشوائية للطيران
                div.style.animationDuration = (Math.random() * 4 + 3) + 's';
                document.body.appendChild(div);
                
                // حذف الإيموجي بعد ما يخلص عشان ميزحمش الصفحة
                setTimeout(() => div.remove(), 6000);
            }, 700);
        }
    </script>
</body>
</html>
